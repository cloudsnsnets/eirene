server {
    listen 8082;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header Service-Worker-Allowed "/";
    add_header Cache-Control "no-cache";

    # Enroll endpoint — local network only
    # Cloudflare tunnel traffic arrives from Docker network (172.x.x.x)
    # Direct local access arrives from 192.168.x.x or 10.x.x.x
    location /voice-auth/enroll {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;
        proxy_pass http://eirene-voice-auth:8081/enroll;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Voice auth API
    location /voice-auth/ {
        proxy_pass http://eirene-voice-auth:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Tunnel hopper — SSE path rotation notifications
    location /sse {
        proxy_pass http://eirene-tunnel-hopper:8083/sse;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # SSE requires these headers
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    location /current-path {
        proxy_pass http://eirene-tunnel-hopper:8083/current-path;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Eirene proxy — routes real traffic
    location /proxy/ {
        proxy_pass http://eirene-proxy:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Proxy-Authorization $http_proxy_authorization;
        proxy_set_header X-Eirene-Token $http_x_eirene_token;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    location ~* \.js$ {
        add_header Content-Type "application/javascript";
        add_header Service-Worker-Allowed "/";
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
