server {
    listen 8082;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header Service-Worker-Allowed "/";
    add_header Cache-Control "no-cache";

    # Voice auth API
    location /voice-auth/ {
        proxy_pass http://eirene-voice-auth:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Eirene proxy — routes real traffic
    location /proxy/ {
        proxy_pass http://eirene-proxy:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Proxy-Authorization $http_proxy_authorization;
        proxy_set_header X-Eirene-Token $http_x_eirene_token;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    location ~* \.js$ {
        add_header Content-Type "application/javascript";
        add_header Service-Worker-Allowed "/";
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
